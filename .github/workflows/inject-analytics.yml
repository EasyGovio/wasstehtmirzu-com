name: Inject PACDI Standards

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run inject script
        run: python3 inject.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PACDI Bot"
          git add -A
          git diff --staged --quiet || (git commit -m "Auto: Analytics + AdSense + Canonical + Mobile Header Fix" && git push)
